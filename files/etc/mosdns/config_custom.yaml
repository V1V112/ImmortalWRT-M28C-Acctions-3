log:
  level: error    # 日志级别。可选 "debug" "info" "warn" "error"。默认 "info"。
  # 日志文件路径。默认 "mosdns.log"（当前目录）。如果不需要日志文件可设置为 ""。
  file: mosdns.log

include:
  ## NFT 规则添加 ##
  - mosdns_nft/nft.yaml
  ## 上游服务器 ##
  - mosdns_forward/forward.yaml
  ## SRS 数据列表 ##
  - mosdns_rules_srs/srs.yaml
  ## 数据列表 ##
#  - mosdns_load_rules/rules.yaml
  ## 未知域名判断（fallback） ##
#  - mosdns_fallback/fallback.yaml


plugins:
## 自定 Fakeip 域名列表 ##
  - tag: fakeip_domain
    type: domain_set
    args:
      exps:
        - domain:emby.as174.de      #Emby
        - domain:javmenu.com      #Javdb
        - domain:jdbstatic.com      #Javdb

    # 以 domain: 开头，域匹配。e.g: domain:google.com 会匹配自身 google.com，以及其子域名 www.google.com, maps.l.google.com 等。
    # 以 full: 开头，完整匹配。e.g: full:google.com 只会匹配自身。
    # 以 keyword: 开头，关键字匹配。e.g: keyword:google.com 会匹配包含这个字段的域名，如 google.com.hk, www.google.com.hk。
    # 以 regexp: 开头，正则匹配(Golang 标准)。e.g: regexp:.+\.google\.com$。

  # 重定向域名
  - tag: redirect
    type: redirect
    args:
      rules:
        # - a.com b.com      # a.com 域名使用 b.com 解析结果
        #- free.lilyemby.com xn--ktff-jt6hr36l.tencentapp.cn      # a.com 域名使用 b.com 解析结果

### ======================== 运行序列 ======================== ###
### ============ 子运行序列 ============ ###
  # prefer_ipv4 / IPv4优先会并发触发参考 A 查询；此子序列内部可用 exit，但由 main_sequence 通过 try 调用以避免 ErrExit 影响 prefer_ipv4 判断
  - tag: resolve_after_prefer
    type: sequence
    args:
      # 直连域名
      - matches:
        - qname
          $geosite:direct      # 直连域名列表
        exec:
          - $smartdns_direct      # SmartDNS 直连组
      - matches:
        - has_resp      # 有应答
        exec: exit      # 结束分支

      # FakeIP 域名
      - matches:
        - qname
          $geosite:fakeip
          $fakeip_domain      # FakeIP 域名列表
        exec:
          - $fakeip_fallback      # FakeIP FallBack 组
      - matches:
        - has_resp      # 有应答
        exec: exit      # 结束分支

      # 代理域名
      - matches:
        - qname
          $geosite:proxy      # 代理域名列表
        exec:
          - $smartdns_proxy      # SmartDNS 代理组   fakeip_fallback / smartdns_proxy
      - matches:
        - has_resp      # 有应答
        exec: exit      # 结束分支

      # 未知域名
      - exec:
        - $smartdns_direct      # SmartDNS 直连组
      - matches:
        - has_resp      # 有应答
        exec: exit      # 结束分支

### ============ 主运行序列 ============ ###
  - tag: main_sequence
    type: sequence
    args:

      # hosts
      - exec: $hosts      # 本地 hosts 解析
      - matches: has_resp      # 有应答
        exec: exit      # 结束分支

      # 屏蔽 SOA / PTR / HTTPS / SVCB 类型
      - matches:
        - qtype 6 12 65 64      # SOA / PTR / HTTPS / SVCB 类型
        exec: 
          - reject 0      # 直接拒绝
          - exit      # 结束分支

      # 域名重定向
      - exec: $redirect

      # 屏蔽广告域名
      - matches:
        - qname $geosite:reject      # 广告域名
        exec: 
          - reject 3      # 直接拒绝
          - exit      # 结束分支

      # 优先返回IPv4地址
      - exec: prefer_ipv4      # 并发触发 A / AAAA 查询，优先返回 A 记录
      - exec: try $resolve_after_prefer  # 吞掉子序列中的 ErrExit，保证 prefer_ipv4 参考查询判定成功

  # 启动监听服务
  - tag: udp_server
    type: udp_server      # UDP 监听服务
    args:
      entry: main_sequence      # 入口运行序列
      listen: :53      # 监听地址和端口，格式为 IP:PORT
      enable_audit: false      # 是否启用审计日志

  - tag: tcp_server
    type: tcp_server      # TCP 监听服务
    args:
      entry: main_sequence      # 入口运行序列
      listen: :53      # 监听地址和端口，格式为 IP:PORT
      enable_audit: false      # 是否启用审计日志

# 用于 domain_output 热更新 learned_*（仅本机访问即可）
api:
  http: 0.0.0.0:9099
