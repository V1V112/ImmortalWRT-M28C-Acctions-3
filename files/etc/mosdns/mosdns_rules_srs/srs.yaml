#### 数据列表 ####

plugins:
  # 自定义hosts
  - tag: hosts
    type: hosts
    args:
      files:
        - mosdns_load_rules/geoip/hosts      # 自定义hosts
### ============ 域名列表 ============ ###
  ## 广告域名列表 ##
  - tag: geosite:reject
    type: sd_set
    args:
      local_config: "mosdns_rules_srs/json/reject.json"

  ## 直连域名列表 ##
  - tag: geosite:direct
    type: sd_set
    args:
      local_config: "mosdns_rules_srs/json/direct.json"

  ## Apple 在中国大陆可直连的域名列表 ##
  - tag: geosite:apple-cn
    type: sd_set
    args:
      local_config: "mosdns_rules_srs/json/apple-cn.json"

  ## Google 在中国大陆可直连的域名列表 ##
  - tag: geosite:google-cn
    type: sd_set
    args:
      local_config: "mosdns_rules_srs/json/google-cn.json"

  ## 代理域名列表 ##
  - tag: geosite:proxy
    type: sd_set
    args:
      local_config: "mosdns_rules_srs/json/proxy.json"

  ## FkaeIP 域名列表 ##
  - tag: geosite:fakeip
    type: sd_set
    args:
      local_config: "mosdns_rules_srs/json/fakeip.json"

### ============ IP 列表 ============###
  ## 国内 IP 段 ##
  - tag: geoip:cn
    type: si_set
    args:
      local_config: "mosdns_rules_srs/json/china-ip.json"
