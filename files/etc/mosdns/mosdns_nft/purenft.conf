table inet sing-box {
  #======================================================================
  # 1. IP 地址集合定义
  #======================================================================
  
  # --- Sing-box 的 IP 集合 ---
  set local_ipv4 {
    type ipv4_addr
    flags interval
    elements = {
      52.0.131.132/32, 3.221.228.214/32, 18.207.84.236/32, 28.0.0.0/8,
      8.8.8.8/32, 8.8.4.4/32, 1.0.0.1/32, 1.1.1.1/32, 9.9.9.9/32,
      8.41.4.0/24, 5.28.192.0/18, 23.23.189.144/28, 23.246.0.0/18,
      34.195.253.0/25, 37.77.184.0/21, 38.72.126.0/24, 45.57.0.0/17,
      52.24.178.0/24, 52.35.140.0/24, 54.204.25.0/28, 54.213.167.0/24,
      64.120.128.0/17, 66.197.128.0/17, 69.53.224.0/19, 103.87.204.0/22,
      108.175.32.0/20, 185.2.220.0/22, 185.9.188.0/22, 192.173.64.0/18,
      198.38.96.0/19, 198.45.48.0/20, 203.75.84.0/24, 203.198.13.0/24,
      203.198.80.0/24, 207.45.72.0/22, 208.75.76.0/22, 210.0.153.0/24,
      216.239.36.0/24, 91.108.56.0/22, 91.108.4.0/22, 91.108.8.0/22,
      91.108.16.0/22, 91.108.12.0/22, 149.154.160.0/20, 91.105.192.0/23,
      91.108.20.0/22, 185.76.151.0/24, 95.161.64.0/20
    }
  }

  set local_ipv6 {
    type ipv6_addr
    flags interval
    elements = {
      2001:b28:f23d::/48, 2001:b28:f23f::/48, 2001:67c:4e8::/48,
      2001:b28:f23c::/48, 2a0a:f280::/32, 2607:fb10::/32,
      2620:10c:7000::/44, 2a00:86c0::/32, 2a03:5640::/32,
      2001:4860:4860::8888/128, 2001:4860:4860::8844/128,
      2001:2::1/64
    }
  }

  set router_ipv4 {
    type ipv4_addr
    flags interval
    elements = {
      28.0.0.0/8, 8.8.8.8/32, 8.8.4.4/32, 1.0.0.1/32,
      1.1.1.1/32, 9.9.9.9/32
    }
  }

  set router_ipv6 {
    type ipv6_addr
    flags interval
    elements = {
      2001:4860:4860::8888/128, 2001:4860:4860::8844/128,
      2001:2::1/64
    }
  }

  # --- Mihomo 的 IP 集合 ---
  set mihomo_ipv4 {
    type ipv4_addr
    flags interval
    elements = {
      30.0.0.0/8
    }
  }

  set mihomo_ipv6 {
    type ipv6_addr
    flags interval
    elements = {
      2400::/64
    }
  }

  #======================================================================
  # 2. 自定义处理链 (动作定义)
  #======================================================================
  
  # --- Sing-box 的动作 ---
  chain singbox-tproxy {
    # [优化方案二] 增加 ct mark set 1
    # [语法修正] 显式声明 meta l4proto udp
    meta l4proto udp meta mark set 1 ct mark set 1 tproxy to :7895 accept
  }

  chain singbox-mark {
    # Output 链专用，只打标
    meta mark set 1 ct mark set 1
  }

  # --- Mihomo 的动作 ---
  chain mihomo-tproxy {
    #[优化方案二] 增加 ct mark set 2 记录连接状态
    # [语法修正] 显式声明 meta l4proto udp
    meta l4proto udp meta mark set 2 ct mark set 2 tproxy to :7893 accept
  }

  chain mihomo-mark {
    # Output 链专用，只打标
    meta mark set 2 ct mark set 2
  }

  # 注意：preraw 链已彻底删除

  #======================================================================
  # 3. 系统 Hook 链
  #======================================================================

  # -- MANGLE PREROUTING: 只处理 UDP --
  chain mangle-prerouting {
    type filter hook prerouting priority mangle; policy accept;
    
    # 公共规则：[优化方案一] 协议预判：如果不是 UDP，直接返回
    meta l4proto != udp return

    # 公共规则：[防回环修复] 防止目标是本机(WAN/LAN) IP 的流量被误劫持/误入 TProxy
    fib daddr type local return

    # --- 快速路径：缓存加速 ---
    # 如果有 Sing-box 的缓存标记，直接恢复并执行
    ct mark 1 meta mark set 1 goto singbox-tproxy
    # 如果有 Mihomo 的缓存标记，直接恢复并执行
    ct mark 2 meta mark set 2 goto mihomo-tproxy

    # --- 慢速路径：IP 集合查找 (只有首包会走到这里) ---
    # 匹配 Sing-box 的 IP 集合
    ip daddr @local_ipv4 goto singbox-tproxy
    ip6 daddr @local_ipv6 goto singbox-tproxy

    # 匹配 Mihomo 的 IP 集合
    ip daddr @mihomo_ipv4 goto mihomo-tproxy
    ip6 daddr @mihomo_ipv6 goto mihomo-tproxy
  }

  # -- MANGLE OUTPUT: 路由器本机 UDP --
  chain mangle-output {
    type route hook output priority mangle; policy accept;

    # 公共规则：[优化方案一] 标记预判
    meta mark 8888 return

    # 公共规则：[优化方案一] 协议预判
    meta l4proto != udp return

    # 公共规则：[防回环修复]
    fib daddr type local return

    # --- 快速路径：缓存加速 ---
    ct mark 1 meta mark set 1 goto singbox-mark
    ct mark 2 meta mark set 2 goto mihomo-mark

    # --- 慢速路径：IP 集合查找 ---
    # 匹配 Sing-box 的 IP 集合
    ip daddr @router_ipv4 goto singbox-mark
    ip6 daddr @router_ipv6 goto singbox-mark

    # 匹配 Mihomo 的 IP 集合
    ip daddr @mihomo_ipv4 goto mihomo-mark
    ip6 daddr @mihomo_ipv6 goto mihomo-mark
  }

  # -- NAT PREROUTING: 只处理 TCP --
  chain nat-prerouting {
    type nat hook prerouting priority dstnat; policy accept;
    
    # 公共规则：[优化方案一] 协议预判：如果不是 TCP，直接返回
    meta l4proto != tcp return

    # Sing-box 流量劫持
    # [语法修正] redirect 动作前必须显式声明 meta l4proto tcp
    ip daddr @local_ipv4 meta l4proto tcp redirect to :7899
    ip6 daddr @local_ipv6 meta l4proto tcp redirect to :7899

    # Mihomo 流量劫持
    ip daddr @mihomo_ipv4 meta l4proto tcp redirect to :7892
    ip6 daddr @mihomo_ipv6 meta l4proto tcp redirect to :7892
  }

  # -- NAT OUTPUT: 路由器本机 TCP --
  chain nat-output {
    type nat hook output priority filter; policy accept;

    # 公共规则：[优化方案一] 标记预判
    meta mark 8888 return

    # 公共规则：[优化方案一] 协议预判
    meta l4proto != tcp return

    # Sing-box 流量劫持
    ip daddr @router_ipv4 meta l4proto tcp redirect to :7899
    ip6 daddr @router_ipv6 meta l4proto tcp redirect to :7899

    # Mihomo 流量劫持
    ip daddr @mihomo_ipv4 meta l4proto tcp redirect to :7892
    ip6 daddr @mihomo_ipv6 meta l4proto tcp redirect to :7892
  }
}