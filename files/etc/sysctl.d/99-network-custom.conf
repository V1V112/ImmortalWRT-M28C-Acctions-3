# ============================================================
# MangoPi M28C / ImmortalWrt
# 5G + MT5700 + TProxy + BBR 专版 sysctl 配置
# 适合：1GB 内存设备 / 5G 上网 / 透明代理 / 长时间运行
# ============================================================


# ============================================================
# 1. TCP 拥塞控制与队列调度
# ============================================================

# BBR 拥塞控制
# 需要内核支持 tcp_bbr，或安装 kmod-tcp-bbr
net.ipv4.tcp_congestion_control = bbr

# BBR 推荐搭配 fq
# 需要 kmod-sched-core / fq qdisc 支持
net.core.default_qdisc = fq


# ============================================================
# 2. Kernel 基础稳定性
# ============================================================

# 内核 panic 后 3 秒自动重启
kernel.panic = 3

# 禁用 SysRq，避免误操作
kernel.sysrq = 0

# ARM 小设备一般不需要 NUMA balance
kernel.numa_balancing = 0


# ============================================================
# 3. VM 内存策略
# ============================================================

# 1GB 内存设备建议保持较低 swap 倾向
vm.swappiness = 10

# 降低脏页比例，避免突然大量写盘导致卡顿
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# 允许内存 overcommit，适合 OpenWrt 常见场景
vm.overcommit_memory = 1

# 不建议 OOM 直接 panic，避免因为单个进程导致整机重启
vm.panic_on_oom = 0

# 1GB 内存设备预留 32MB 空闲内存
# 如果插件很多、sing-box/mosdns/smartdns/qmodem 同时运行，可以保守用 32768
vm.min_free_kbytes = 32768


# ============================================================
# 4. Net Core 网络缓冲
# ============================================================

# 5G 网络瞬时包量可能较大，适当提高 backlog
net.core.netdev_max_backlog = 3000

# 提高监听队列，适合代理、Web 管理、局域网并发连接
net.core.somaxconn = 1024

# 接收 / 发送缓冲最大值
# 1GB 内存设备不建议拉太高，8MB 比较稳
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608

# 默认缓冲
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# Socket 选项内存
net.core.optmem_max = 65535


# ============================================================
# 5. TCP 针对 5G + BBR 优化
# ============================================================

# TCP Fast Open
# 3 = 客户端和服务端都启用
net.ipv4.tcp_fastopen = 3

# 开启 MTU 探测，降低 5G / 隧道 / 代理环境下黑洞 MTU 问题
net.ipv4.tcp_mtu_probing = 1

# 空闲后不重新慢启动，适合长连接和代理
net.ipv4.tcp_slow_start_after_idle = 0

# TIME_WAIT / FIN 优化
net.ipv4.tcp_fin_timeout = 20
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_max_tw_buckets = 16384

# SYN 重试保持稳妥，5G 弱网不要设置太激进
net.ipv4.tcp_syn_retries = 5
net.ipv4.tcp_synack_retries = 3

# TCP buffer 策略
# 最大值控制在 8MB，防止代理高并发时爆内存
net.ipv4.tcp_rmem = 4096 87380 8388608
net.ipv4.tcp_wmem = 4096 65536 8388608

# 降低发送端堆积，改善弱网下应用层卡顿
# 对代理 / 5G 网络有帮助
net.ipv4.tcp_notsent_lowat = 32768

# 孤儿 socket 控制，防止异常连接占满内存
net.ipv4.tcp_max_orphans = 32768
net.ipv4.tcp_orphan_retries = 2


# ============================================================
# 6. TProxy / 透明代理核心参数
# ============================================================

# TProxy 必须关闭 rp_filter
# 否则策略路由 / 回环转发可能异常
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0


# ============================================================
# 7. 路由与本地端口
# ============================================================

# 扩大本地端口范围，适合代理和高并发连接
net.ipv4.ip_local_port_range = 1024 65535

# 路由缓存 GC 时间
net.ipv4.route.gc_timeout = 100


# ============================================================
# 8. 邻居表 / ARP 表
# ============================================================

# 局域网设备多、IoT 设备多时，邻居表容易爆
net.ipv4.neigh.default.gc_stale_time = 120
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096


# ============================================================
# 9. 基础安全
# ============================================================

# 防 SYN Flood
net.ipv4.tcp_syncookies = 1

# ARP 行为优化
# 多网段 / VLAN / 旁路由 / TProxy 场景下更稳
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.all.arp_ignore = 1


# ============================================================
# 10. 5G CGNAT 保活
# ============================================================

# 5G 网络、运营商 CGNAT、移动网络下有助于保持长连接
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5


# ============================================================
# 11. Netfilter / Conntrack
# ============================================================

# 1GB 内存设备不要设置过高
# 131072 对普通家庭 + 透明代理 + 5G 路由基本够用
net.netfilter.nf_conntrack_max = 131072

# TCP established 连接跟踪时间
# 默认通常很长，缩短到 2 小时，减少无效连接占用
net.netfilter.nf_conntrack_tcp_timeout_established = 7200

# TIME_WAIT 连接跟踪回收
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 20

# UDP 普通连接超时
net.netfilter.nf_conntrack_udp_timeout = 30

# UDP stream 超时
# QUIC / HTTP3 / 游戏 / DNS over QUIC 会用到
net.netfilter.nf_conntrack_udp_timeout_stream = 120


# ============================================================
# 12. UDP 缓冲
# ============================================================

# UDP 最小收发缓冲
# 对 DNS、QUIC、游戏、部分代理协议有帮助
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192